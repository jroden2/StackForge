name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Extract version
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install signing certificate
        env:
          CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
          CERTIFICATE_PWD: ${{ secrets.MAC_CERTIFICATE_PWD }}
        run: |
          echo "$CERTIFICATE" | base64 --decode > cert.p12
          
          security create-keychain -p build build.keychain
          security unlock-keychain -p build build.keychain
          
          security import cert.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          
          security list-keychains -d user -s build.keychain

      - name: Build macOS binaries
        run: |
          mkdir -p build

          VERSION=${{ steps.vars.outputs.VERSION }}

          GOOS=darwin GOARCH=amd64 go build -o build/stackforge-amd64 ./cmd
          GOOS=darwin GOARCH=arm64 go build -o build/stackforge-arm64 ./cmd

      - name: Create universal binary
        run: |
          VERSION=${{ steps.vars.outputs.VERSION }}

          lipo -create \
            build/stackforge-amd64 \
            build/stackforge-arm64 \
            -output build/stackforge-$VERSION-darwin-universal

      - name: Sign universal binary
        run: |
          codesign --force --deep --sign "StackForgeSigner" build/stackforge-*

      - name: Verify signature
        run: |
          codesign --verify --deep --strict --verbose=2 build/stackforge-*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stackforge
          path: build/stackforge-*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: build
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*